<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Producción – Abril 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3350;--accent:#4f8ef7;--accent2:#34d399;--accent3:#f59e0b;--accent4:#f87171;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh;}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:16px;font-weight:600;}
  .header .subtitle{font-size:11px;color:var(--text2);margin-top:2px;}
  .today-badge{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--text2);}
  .layout{display:flex;height:calc(100vh - 57px);overflow:hidden;}
  .sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .filter-section{display:flex;flex-direction:column;gap:8px;}
  .filter-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding-bottom:4px;border-bottom:1px solid var(--border);}
  .filter-group{display:flex;flex-direction:column;gap:4px;}
  .filter-label{font-size:11px;color:var(--text2);font-weight:500;}
  select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:11px;width:100%;outline:none;cursor:pointer;appearance:auto;}
  select:focus{border-color:var(--accent);}
  select option{background:var(--bg3);color:var(--text);}
  .btn-reset{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;width:100%;transition:all 0.2s;}
  .btn-reset:hover{border-color:var(--accent4);color:var(--accent4);}
  .main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
  .dash-title{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;}
  .dash-title h2{font-size:14px;font-weight:600;}
  .dash-title .dash-subtitle{font-size:11px;color:var(--text2);margin-top:3px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .kpi-card.form{border-left:3px solid var(--accent);}
  .kpi-card.emb{border-left:3px solid var(--accent2);}
  .kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .kpi-value{font-size:22px;font-weight:700;line-height:1;}
  .kpi-value.warn{color:var(--accent3);}
  .kpi-value.danger{color:var(--accent4);}
  .kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;}
  .prog-bar-wrap{margin-top:6px;background:var(--bg3);border-radius:4px;height:4px;overflow:hidden;}
  .prog-bar{height:100%;border-radius:4px;}
  .prog-bar.form{background:var(--accent);}
  .prog-bar.emb{background:var(--accent2);}
  .section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .section-header h3{font-size:13px;font-weight:600;}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .badge.form{background:rgba(79,142,247,0.15);color:var(--accent);}
  .badge.emb{background:rgba(52,211,153,0.15);color:var(--accent2);}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;}
  .chart-title{font-size:12px;font-weight:600;margin-bottom:10px;}
  .table-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;}
  .table-title{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .table-scroll{overflow-x:auto;overflow-y:auto;max-height:320px;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{background:var(--bg3);color:var(--text2);font-weight:600;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:0.4px;position:sticky;top:0;z-index:1;}
  td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .pct-cell{font-weight:700;}
  .pct-high{color:var(--accent2);}
  .pct-mid{color:var(--accent3);}
  .pct-low{color:var(--accent4);}
  .crit-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
  .crit-alta{background:rgba(248,113,113,0.15);color:var(--accent4);}
  .crit-media{background:rgba(245,158,11,0.15);color:var(--accent3);}
  .crit-baja{background:rgba(79,142,247,0.15);color:var(--accent);}
  .crit-ok{background:rgba(52,211,153,0.15);color:var(--accent2);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .empty-msg{color:var(--text3);font-size:12px;text-align:center;padding:20px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  @media(max-width:900px){.charts-grid,.two-col{grid-template-columns:1fr;}}
</style>
</head>

</div>

function pct(num,den){ if(!den||den===0) return 0; return Math.min(100,Math.round((num/den)*1000)/10); }
function pctClass(v){ return v>=80?'pct-high':v>=50?'pct-mid':'pct-low'; }
function fmtNum(v){ return Math.round(v).toLocaleString('es-CO'); }
function fmtT(v){ return (v/1000).toFixed(2); }

function getVal(id){ return document.getElementById(id).value; }

function setOptions(id, values, selected){
  var sel = document.getElementById(id);
  var prev = selected !== undefined ? selected : sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  values.forEach(function(v){
    var opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if(v === prev) opt.selected = true;
    sel.appendChild(opt);
  });
}

function unique(arr){ var s={},r=[]; arr.forEach(function(v){if(v&&!s[v]){s[v]=1;r.push(v);}}); return r.sort(); }

function getBaseRows(){
  var sem = getVal('f-semana');
  return allRows.filter(function(r){
    if(r.tipo!=='Formación'&&r.tipo!=='Embolsado') return false;
    if(sem && r.semana !== sem) return false;
    return true;
  });
}

function refreshLinea(){
  var base = getBaseRows();
  var planta = getVal('f-planta');
  if(planta) base = base.filter(function(r){return r.planta===planta;});
  setOptions('f-linea', unique(base.map(function(r){return r.linea;})));
}

function refreshProceso(){
  var base = getBaseRows();
  var planta = getVal('f-planta'), linea = getVal('f-linea');
  if(planta) base = base.filter(function(r){return r.planta===planta;});
  if(linea) base = base.filter(function(r){return r.linea===linea;});
  setOptions('f-proceso', unique(base.map(function(r){return r.proceso;})));
}

function onSemanaChange(){
  var base = getBaseRows();
  setOptions('f-planta', unique(base.map(function(r){return r.planta;})));
  refreshLinea(); refreshProceso(); renderDashboard();
}
function onPlantaChange(){ refreshLinea(); refreshProceso(); renderDashboard(); }
function onLineaChange(){ refreshProceso(); renderDashboard(); }
function onProcesoChange(){ renderDashboard(); }

function resetFilters(){
  document.getElementById('f-semana').value = TODAY_SEMANA;
  onSemanaChange();
}

function getFilteredRows(){
  var sem=getVal('f-semana'), planta=getVal('f-planta'), linea=getVal('f-linea'), proceso=getVal('f-proceso');
  return allRows.filter(function(r){
    if(r.tipo!=='Formación'&&r.tipo!=='Embolsado') return false;
    if(sem && r.semana!==sem) return false;
    if(planta && r.planta!==planta) return false;
    if(linea && r.linea!==linea) return false;
    if(proceso && r.proceso!==proceso) return false;
    return true;
  });
}

// KEY FIX: prog = sem_prog[row.semana] (own week)
function rowProg(r){ return r.sem_prog[r.semana] || 0; }

function aggByLinea(rows, tipo){
  var map = {};
  rows.filter(function(r){return r.tipo===tipo;}).forEach(function(r){
    var k = r.linea;
    if(!map[k]) map[k]={linea:k,planta:r.planta,prog:0,notif:0,pend:0};
    map[k].prog += rowProg(r);
    map[k].notif += r.cant_notif;
    map[k].pend += r.cant_pend;
  });
  return Object.values(map).sort(function(a,b){return a.linea.localeCompare(b.linea);});
}

    else if(av<80){critLabel='Baja';critClass='crit-baja';}
    else{critLabel='OK';critClass='crit-ok';}
    h+='<tr><td style="color:var(--text3)">'+(i+1)+'</td>'
      +'<td><strong>'+l.linea+'</strong></td><td style="color:var(--text2)">'+l.planta+'</td>'
      +'<td>'+fmtT(l.prog)+'</td><td>'+fmtT(l.notif)+'</td><td>'+fmtT(l.pend)+'</td>'
      +'<td class="pct-cell '+pctClass(av)+'">'+av+'%</td>'
      +'<td><span class="crit-badge '+critClass+'">'+critLabel+'</span></td></tr>';
  });
  return h+'</tbody></table></div>';
}

function renderPendOrders(data){
  if(!data.length) return '<div class="empty-msg">No hay órdenes con pendiente</div>';
  var h='<div class="table-scroll"><table><thead><tr><th>Línea</th><th>Planta</th><th>Orden</th><th>Semielaborado</th><th>Proceso</th><th>Pendiente</th><th>Fecha Cierre</th></tr></thead><tbody>';
  data.forEach(function(o){
    var isOverdue=false;
    if(o.fecha_cierre){
      var p=o.fecha_cierre.split('/');
      if(p.length===3){ var d=new Date(p[2]+'-'+p[1]+'-'+p[0]); isOverdue=d<new Date('2026-04-13'); }
    }
    h+='<tr><td>'+o.linea+'</td><td style="color:var(--text2)">'+o.planta+'</td>'
      +'<td style="font-family:monospace;color:var(--accent)">'+o.orden+'</td>'
      +'<td style="color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis" title="'+o.semielaborado+'">'+o.semielaborado+'</td>'
      +'<td><span class="badge emb">'+o.proceso+'</span></td>'
      +'<td>'+fmtNum(o.pend)+' '+o.un+'</td>'
      +'<td style="color:'+(isOverdue?'var(--accent4)':'var(--text)')+'">'+( o.fecha_cierre||'–')+(isOverdue?' ⚠️':'')+'</td></tr>';
  });
  return h+'</tbody></table></div>';
}

function destroyChart(c){ if(c){try{c.destroy();}catch(e){}} return null; }

var COPTS={responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},scales:{x:{ticks:{color:'#64748b',font:{size:9},maxRotation:45},grid:{color:'#2e3350'}},y:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#2e3350'}}}};

function renderChartForm(data){
  chartFormProg=destroyChart(chartFormProg);
  var ctx=document.getElementById('chartForm');
  if(!ctx||!data.length) return;
  chartFormProg=new Chart(ctx,{type:'bar',data:{labels:data.map(function(l){return l.linea;}),datasets:[
    {label:'Programado (t)',data:data.map(function(l){return +fmtT(l.prog);}),backgroundColor:'rgba(79,142,247,0.4)',borderColor:'#4f8ef7',borderWidth:1},
    {label:'Notificado (t)',data:data.map(function(l){return +fmtT(l.notif);}),backgroundColor:'rgba(79,142,247,0.85)',borderColor:'#4f8ef7',borderWidth:1}
  ]},options:JSON.parse(JSON.stringify(COPTS))});
}

function renderChartEmb(data){
  chartEmbProg=destroyChart(chartEmbProg);
  var ctx=document.getElementById('chartEmb');
  if(!ctx||!data.length) return;
  chartEmbProg=new Chart(ctx,{type:'bar',data:{labels:data.map(function(l){return l.linea;}),datasets:[
    {label:'Programado (PAC)',data:data.map(function(l){return Math.round(l.prog);}),backgroundColor:'rgba(52,211,153,0.35)',borderColor:'#34d399',borderWidth:1},
    {label:'Notificado (PAC)',data:data.map(function(l){return Math.round(l.notif);}),backgroundColor:'rgba(52,211,153,0.85)',borderColor:'#34d399',borderWidth:1}
  ]},options:JSON.parse(JSON.stringify(COPTS))});
}

function renderDashboard(){
  var rows=getFilteredRows();
  var sem=getVal('f-semana'), planta=getVal('f-planta'), linea=getVal('f-linea'), proceso=getVal('f-proceso');
  var semLabel=sem?(SEMANA_LABELS[sem]||('S'+sem)):'Todas las semanas';
  var plantaLabel=planta||'Todas las plantas';
  var lineaLabel=linea||'Todas las líneas';
  var procesoLabel=proceso||'Todos los procesos';

  var formRows=rows.filter(function(r){return r.tipo==='Formación';});
  var embRows=rows.filter(function(r){return r.tipo==='Embolsado';});

  var fProg=formRows.reduce(function(a,r){return a+rowProg(r);},0);
  var fNotif=formRows.reduce(function(a,r){return a+r.cant_notif;},0);
  var fPend=formRows.reduce(function(a,r){return a+r.cant_pend;},0);
  var fAvance=pct(fNotif,fProg);

  var eProg=embRows.reduce(function(a,r){return a+rowProg(r);},0);
  var eNotif=embRows.reduce(function(a,r){return a+r.cant_notif;},0);
  var ePend=embRows.reduce(function(a,r){return a+r.cant_pend;},0);
  var eAvance=pct(eNotif,eProg);

  var formByLinea=aggByLinea(rows,'Formación');
  var embByLinea=aggByLinea(rows,'Embolsado');

  var critForm=formByLinea.map(function(l){
    return Object.assign({},l,{avance:pct(l.notif,l.prog),score:(1-(l.prog>0?l.notif/l.prog:0))*l.pend});
  }).filter(function(l){return l.prog>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,10);

  var embPendOrders=embRows.filter(function(r){return r.cant_pend>0&&r.orden;}).map(function(r){
    return {linea:r.linea,planta:r.planta,orden:r.orden,semielaborado:r.semielaborado,pend:r.cant_pend,un:r.un,fecha_cierre:r.fecha_cierre,proceso:r.proceso};
  }).sort(function(a,b){return a.linea.localeCompare(b.linea);});

  document.getElementById('main-content').innerHTML=
    '<div class="dash-title"><h2>&#128197; '+semLabel+'</h2>'
    +'<div class="dash-subtitle">&#127981; '+plantaLabel+' &nbsp;&middot;&nbsp; &#128295; '+lineaLabel+' &nbsp;&middot;&nbsp; &#9881;&#65039; '+procesoLabel+'</div></div>'

    +'<div><div class="section-header"><h3>Formación</h3><span class="badge form">KG / Toneladas</span></div>'
    +'<div class="kpi-grid">'
    +'<div class="kpi-card form"><div class="kpi-label">Programado</div><div class="kpi-value">'+fmtT(fProg)+'<span style="font-size:13px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fProg)+' KG</div></div>'
    +'<div class="kpi-card form"><div class="kpi-label">Notificado SAP</div><div class="kpi-value">'+fmtT(fNotif)+'<span style="font-size:13px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fNotif)+' KG</div></div>'
    +'<div class="kpi-card form"><div class="kpi-label">Pendiente</div><div class="kpi-value '+(fPend>fProg*0.3?'warn':'')+'">'+fmtT(fPend)+'<span style="font-size:13px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fPend)+' KG</div></div>'
    +'<div class="kpi-card form"><div class="kpi-label">% Avance</div><div class="kpi-value '+(fAvance<50?'danger':fAvance<80?'warn':'')+'">'+fAvance+'<span style="font-size:13px">%</span></div><div class="prog-bar-wrap"><div class="prog-bar form" style="width:'+fAvance+'%"></div></div></div>'
    +'</div></div>'

    +'<div><div class="section-header"><h3>Embolsado</h3><span class="badge emb">PAC / Unidades</span></div>'
    +'<div class="kpi-grid">'
    +'<div class="kpi-card emb"><div class="kpi-label">Programado</div><div class="kpi-value">'+fmtNum(eProg)+'<span style="font-size:13px;color:var(--text2)"> PAC</span></div></div>'
    +'<div class="kpi-card emb"><div class="kpi-label">Notificado SAP</div><div class="kpi-value">'+fmtNum(eNotif)+'<span style="font-size:13px;color:var(--text2)"> PAC</span></div></div>'
    +'<div class="kpi-card emb"><div class="kpi-label">Pendiente</div><div class="kpi-value '+(ePend>eProg*0.3?'warn':'')+'">'+fmtNum(ePend)+'<span style="font-size:13px;color:var(--text2)"> PAC</span></div></div>'
    +'<div class="kpi-card emb"><div class="kpi-label">% Avance</div><div class="kpi-value '+(eAvance<50?'danger':eAvance<80?'warn':'')+'">'+eAvance+'<span style="font-size:13px">%</span></div><div class="prog-bar-wrap"><div class="prog-bar emb" style="width:'+eAvance+'%"></div></div></div>'
    +'</div></div>'

    +'<div class="charts-grid">'
    +'<div class="chart-card"><div class="chart-title">Formación – Programado vs Notificado por Línea (t)</div><canvas id="chartForm" height="220"></canvas></div>'
    +'<div class="chart-card"><div class="chart-title">Embolsado – Programado vs Notificado por Línea (PAC)</div><canvas id="chartEmb" height="220"></canvas></div>'
    +'</div>'

    +'<div class="two-col">'
    +'<div class="table-card"><div class="table-title">&#128203; Detalle Formación por Línea <span class="badge form">Toneladas</span></div>'+renderFormTable(formByLinea)+'</div>'
    +'<div class="table-card"><div class="table-title">&#128203; Detalle Embolsado por Línea <span class="badge emb">PAC</span></div>'+renderEmbTable(embByLinea)+'</div>'
    +'</div>'

    +'<div class="table-card"><div class="table-title">&#128680; Top 10 Líneas Críticas – Formación <span class="badge form">Bajo avance + Alto pendiente</span></div>'+renderCritTable(critForm)+'</div>'
    +'<div class="table-card"><div class="table-title">&#9203; Órdenes de Embolsado con Pendiente <span class="badge emb">Por línea</span></div>'+renderPendOrders(embPendOrders)+'</div>';

  renderChartForm(formByLinea);
  renderChartEmb(embByLinea);
}

window.addEventListener('load',function(){
  var semKeys=Object.keys(SEMANA_LABELS).sort(function(a,b){return +a-+b;});
  var semSel=document.getElementById('f-semana');
  semSel.innerHTML='<option value="">Todas</option>';
  semKeys.forEach(function(k){
    var opt=document.createElement('option');
    opt.value=k; opt.textContent=SEMANA_LABELS[k];
    if(k===TODAY_SEMANA) opt.selected=true;
    semSel.appendChild(opt);
  });

  var base=allRows.filter(function(r){return (r.tipo==='Formación'||r.tipo==='Embolsado')&&r.semana===TODAY_SEMANA;});
  setOptions('f-planta',unique(base.map(function(r){return r.planta;})));
  setOptions('f-linea',unique(base.map(function(r){return r.linea;})));
  setOptions('f-proceso',unique(base.map(function(r){return r.proceso;})));

  document.getElementById('f-semana').addEventListener('change',onSemanaChange);
  document.getElementById('f-planta').addEventListener('change',onPlantaChange);
  document.getElementById('f-linea').addEventListener('change',onLineaChange);
  document.getElementById('f-proceso').addEventListener('change',onProcesoChange);

  renderDashboard();
});
</script>
</body>
</html>
