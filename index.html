<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Producción – Abril 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3350;
  --accent:#4f8ef7;--accent2:#34d399;--accent3:#f59e0b;--accent4:#f87171;--accent5:#a78bfa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header h1{font-size:15px;font-weight:700;}
.header .subtitle{font-size:11px;color:var(--text2);margin-top:2px;}
.today-badge{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text2);white-space:nowrap;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:12px;}
.main{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}

/* SIDEBAR */
.filter-section{display:flex;flex-direction:column;gap:6px;}
.filter-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.filter-group{display:flex;flex-direction:column;gap:3px;}
.filter-label{font-size:11px;color:var(--text2);}
select[multiple]{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 6px;font-size:11px;width:100%;outline:none;cursor:pointer;min-height:70px;max-height:110px;}
select[multiple]:focus{border-color:var(--accent);}
select[multiple] option{background:var(--bg3);color:var(--text);padding:3px 5px;border-radius:3px;}
select[multiple] option:checked{background:var(--accent);color:#fff;}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;width:100%;margin-top:4px;}
.btn-reset:hover{border-color:var(--accent4);color:var(--accent4);}
.filter-hint{font-size:9px;color:var(--text3);margin-top:2px;}

/* PANEL TITLE */
.panel-title-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;}
.panel-title-main{font-size:20px;font-weight:800;color:var(--text);line-height:1.2;word-break:break-word;}
.panel-title-sub{font-size:12px;color:var(--text2);margin-top:4px;}
.panel-title-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;font-size:11px;color:var(--text3);}
.panel-title-meta span{display:flex;align-items:center;gap:4px;}

/* SECTION */
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.section-header h3{font-size:13px;font-weight:600;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.badge.form{background:rgba(79,142,247,0.15);color:var(--accent);}
.badge.emb{background:rgba(52,211,153,0.15);color:var(--accent2);}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;}
.kpi-card.form{border-left:3px solid var(--accent);}
.kpi-card.emb{border-left:3px solid var(--accent2);}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.kpi-value{font-size:20px;font-weight:700;line-height:1;}
.kpi-value.warn{color:var(--accent3);}
.kpi-value.danger{color:var(--accent4);}
.kpi-value.over{color:var(--accent2);}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.prog-bar-wrap{margin-top:5px;background:var(--bg3);border-radius:4px;height:4px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;}
.prog-bar.form{background:var(--accent);}
.prog-bar.emb{background:var(--accent2);}
.prog-bar.over{background:var(--accent2);}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.chart-title{font-size:11px;font-weight:600;margin-bottom:8px;color:var(--text2);}

/* TABLES */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.table-title{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;white-space:normal;line-height:1.4;}
.table-scroll{overflow-x:auto;overflow-y:auto;max-height:320px;border-radius:4px;}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto;}
th{background:var(--bg3);color:var(--text2);font-weight:600;padding:6px 9px;text-align:left;border-bottom:1px solid var(--border);white-space:normal;word-break:break-word;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;position:sticky;top:0;z-index:1;min-width:60px;}
td{padding:5px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.pct-high{color:var(--accent2);font-weight:700;}
.pct-mid{color:var(--accent3);font-weight:700;}
.pct-low{color:var(--accent4);font-weight:700;}
.pct-over{color:var(--accent2);font-weight:700;}
.neg-pend{color:var(--accent4);font-weight:700;}
.over-badge{display:inline-block;background:rgba(52,211,153,0.15);color:var(--accent2);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:3px;}
.crit-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.crit-alta{background:rgba(248,113,113,0.15);color:var(--accent4);}
.crit-media{background:rgba(245,158,11,0.15);color:var(--accent3);}
.crit-baja{background:rgba(79,142,247,0.15);color:var(--accent);}
.crit-ok{background:rgba(52,211,153,0.15);color:var(--accent2);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.empty-msg{color:var(--text3);font-size:12px;text-align:center;padding:20px;}
.overdue{color:var(--accent4);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* RESPONSIVE */
@media(max-width:900px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;flex-wrap:wrap;padding:10px;gap:8px;}
  .filter-section{flex:1;min-width:140px;}
  .btn-reset{width:auto;align-self:flex-end;}
  .charts-grid{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .main{padding:10px;}
  .header h1{font-size:13px;}
  .panel-title-main{font-size:16px;}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .kpi-value{font-size:17px;}
  .sidebar{flex-direction:column;}
  .filter-section{min-width:unset;width:100%;}
  select[multiple]{min-height:55px;max-height:80px;}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>&#128202; Dashboard de Producción &#8211; Abril 2026</h1>
    <div class="subtitle">Seguimiento mensual &middot; Formación &amp; Embolsado</div>
  </div>
  <div class="today-badge">Lunes 13 Abr 2026 &middot; Semana 16</div>
</div>
<div class="layout">

      <div class="filter-hint">Ctrl+clic para selección múltiple</div>

      <div class="filter-hint">Ctrl+clic para selección múltiple</div>
    </div>
    <div class="filter-section">
      <div class="filter-title">&#9881; Proceso</div>
      <select id="f-proceso" multiple></select>
      <div class="filter-hint">Ctrl+clic para selección múltiple</div>
    </div>
    <button class="btn-reset" onclick="resetFilters()">&#8635; Limpiar filtros</button>
  </div>
  <div class="main" id="main-content">
    <div class="empty-msg">Cargando...</div>
  </div>
</div>

    for(var i=0;i<sel.options.length;i++) sel.options[i].selected = false;
  });
  refreshLinea(); refreshProceso(); renderDashboard();
}

function getFiltered(){
  var plantas = getSelected('f-planta'), lineas = getSelected('f-linea'), procesos = getSelected('f-proceso');
  return allRows.filter(function(r){
    if(r.tipo !== 'Formación' && r.tipo !== 'Embolsado') return false;
    if(plantas.length && plantas.indexOf(r.planta) < 0) return false;
    if(lineas.length && lineas.indexOf(r.linea) < 0) return false;
    if(procesos.length && procesos.indexOf(r.proceso) < 0) return false;
    return true;
  });
}

function formProg(r){ return Object.values(r.sem_prog).reduce(function(a,v){ return a+v; }, 0); }
function embProg(r){ return r.cant_prog; }

function aggByLinea(rows, tipo){
  var map = {};
  rows.filter(function(r){ return r.tipo === tipo; }).forEach(function(r){
    var k = r.linea;
    if(!map[k]) map[k] = { linea: k, planta: r.planta, prog: 0, notif: 0, pend: 0 };
    map[k].prog += tipo === 'Formación' ? formProg(r) : embProg(r);
    map[k].notif += r.cant_notif;
    map[k].pend += r.cant_pend;
  });
  return Object.values(map).sort(function(a,b){ return a.linea.localeCompare(b.linea); });
}

function pendCell(pend, unit){
  if(pend < 0){
    return '<td class="neg-pend">'+fmtNum(pend)+' '+unit+'<span class="over-badge">+100%</span></td>';
  }
  return '<td>'+fmtNum(pend)+' '+unit+'</td>';
}

function pctCell(av){
  var cls = pctClass(av);
  var extra = av > 100 ? '<span class="over-badge">Sobre prog.</span>' : '';
  return '<td class="'+cls+'">'+av+'%'+extra+'</td>';
}

function renderFormTable(data){
  if(!data.length) return '<div class="empty-msg">Sin datos</div>';
  var h = '<div class="table-scroll"><table><thead><tr>'
    +'<th>Línea</th><th>Planta</th><th>Prog. (t)</th><th>Notif. (t)</th><th>Pend. (t)</th><th>% Avance</th>'
    +'</tr></thead><tbody>';
  data.forEach(function(l){
    var av = pct(l.notif, l.prog);
    h += '<tr><td>'+l.linea+'</td><td style="color:var(--text2)">'+l.planta+'</td>'
      +'<td>'+fmtT(l.prog)+'</td><td>'+fmtT(l.notif)+'</td>'
      + (l.pend < 0 ? '<td class="neg-pend">'+fmtT(l.pend)+'<span class="over-badge">+100%</span></td>' : '<td>'+fmtT(l.pend)+'</td>')
      + pctCell(av) + '</tr>';
  });
  return h + '</tbody></table></div>';
}

function renderEmbTable(data){
  if(!data.length) return '<div class="empty-msg">Sin datos</div>';
  var h = '<div class="table-scroll"><table><thead><tr>'
    +'<th>Línea</th><th>Planta</th><th>Prog. (PAC)</th><th>Notif. (PAC)</th><th>Pend. (PAC)</th><th>% Avance</th>'
    +'</tr></thead><tbody>';
  data.forEach(function(l){
    var av = pct(l.notif, l.prog);
    h += '<tr><td>'+l.linea+'</td><td style="color:var(--text2)">'+l.planta+'</td>'
      +'<td>'+fmtNum(l.prog)+'</td><td>'+fmtNum(l.notif)+'</td>'
      + (l.pend < 0 ? '<td class="neg-pend">'+fmtNum(l.pend)+'<span class="over-badge">+100%</span></td>' : '<td>'+fmtNum(l.pend)+'</td>')
      + pctCell(av) + '</tr>';
  });
  return h + '</tbody></table></div>';
}

function renderCritTable(data){
  if(!data.length) return '<div class="empty-msg">Sin líneas críticas</div>';
  var h = '<div class="table-scroll"><table><thead><tr>'
    +'<th>#</th><th>Línea</th><th>Planta</th><th>Prog. (t)</th><th>Notif. (t)</th><th>Pend. (t)</th><th>% Avance</th><th>Criticidad</th>'
    +'</tr></thead><tbody>';
  data.forEach(function(l, i){
    var av = l.avance;
    var cl, lb;
    if(av < 30){ cl='crit-alta'; lb='Alta'; }
    else if(av < 60){ cl='crit-media'; lb='Media'; }
    else if(av < 80){ cl='crit-baja'; lb='Baja'; }
    else{ cl='crit-ok'; lb='OK'; }
    h += '<tr><td style="color:var(--text3)">'+(i+1)+'</td>'
      +'<td><strong>'+l.linea+'</strong></td><td style="color:var(--text2)">'+l.planta+'</td>'
      +'<td>'+fmtT(l.prog)+'</td><td>'+fmtT(l.notif)+'</td>'
      + (l.pend < 0 ? '<td class="neg-pend">'+fmtT(l.pend)+'<span class="over-badge">+100%</span></td>' : '<td>'+fmtT(l.pend)+'</td>')
      + pctCell(av)
      +'<td><span class="crit-badge '+cl+'">'+lb+'</span></td></tr>';
  });
  return h + '</tbody></table></div>';
}

function renderPendOrders(rows){
  var data = rows.filter(function(r){ return r.tipo === 'Embolsado' && r.cant_pend > 0 && r.orden; })
    .sort(function(a,b){ return a.linea.localeCompare(b.linea); });
  if(!data.length) return '<div class="empty-msg">No hay órdenes con pendiente</div>';
  var h = '<div class="table-scroll"><table><thead><tr>'
    +'<th>Línea</th><th>Planta</th><th>Orden</th><th>Semielaborado</th>'
    +'<th>Prog. (PAC)</th><th>Notif. (PAC)</th><th>Pend. (PAC)</th><th>Pend. (KG)</th><th>Fecha Cierre</th>'
    +'</tr></thead><tbody>';
  data.forEach(function(r){
    var isOverdue = false;
    if(r.fecha_cierre && r.fecha_cierre !== ''){
      var d = new Date(r.fecha_cierre);
      isOverdue = !isNaN(d) && d < new Date('2026-04-13');
    }
    var fc = r.fecha_cierre ? r.fecha_cierre.substring(0,10) : '–';
    h += '<tr>'
      +'<td>'+r.linea+'</td>'
      +'<td style="color:var(--text2)">'+r.planta+'</td>'
      +'<td style="font-family:monospace;color:var(--accent)">'+r.orden+'</td>'
      +'<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;color:var(--text2)" title="'+r.semielaborado+'">'+r.semielaborado+'</td>'
      +'<td>'+fmtNum(r.cant_prog)+'</td>'
      +'<td>'+fmtNum(r.cant_notif)+'</td>'
      +'<td>'+fmtNum(r.cant_pend)+'</td>'
      +'<td>'+fmtDec(r.peso_total_kg_pend)+'</td>'
      +'<td class="'+(isOverdue?'overdue':'')+'">'+fc+(isOverdue?' ⚠️':'')+'</td>'
      +'</tr>';
  });
  return h + '</tbody></table></div>';
}

function destroyChart(c){ if(c){ try{ c.destroy(); }catch(e){} } return null; }

var DATALABELS_OPTS = {
  anchor: 'end', align: 'end', offset: 2,
  color: '#94a3b8', font: { size: 9, weight: '600' },
  formatter: function(v){ return v > 0 ? v : ''; }
};

var BASE_OPTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins:{
    legend:{ labels:{ color:'#94a3b8', font:{ size:10 }, boxWidth:12 } },
    datalabels: DATALABELS_OPTS
  },
  scales:{
    x:{ ticks:{ color:'#64748b', font:{ size:9 }, maxRotation:45 }, grid:{ color:'#2e3350' } },
    y:{ ticks:{ color:'#64748b', font:{ size:9 } }, grid:{ color:'#2e3350' } }
  }
};

function renderChartF(data){
  chartF = destroyChart(chartF);
  var ctx = document.getElementById('chartF');
  if(!ctx || !data.length) return;
  var opts = JSON.parse(JSON.stringify(BASE_OPTS));
  opts.plugins.datalabels = Object.assign({}, DATALABELS_OPTS, {
    formatter: function(v){ return v > 0 ? v.toFixed(1) : ''; }
  });
  chartF = new Chart(ctx, { type:'bar', data:{
    labels: data.map(function(l){ return l.linea; }),
    datasets:[
      { label:'Programado (t)', data: data.map(function(l){ return parseFloat(fmtT(l.prog)); }),
        backgroundColor:'rgba(79,142,247,0.35)', borderColor:'#4f8ef7', borderWidth:1 },
      { label:'Notificado (t)', data: data.map(function(l){ return parseFloat(fmtT(l.notif)); }),
        backgroundColor:'rgba(79,142,247,0.85)', borderColor:'#4f8ef7', borderWidth:1 }
    ]
  }, options: opts });
}

function renderChartE(data){
  chartE = destroyChart(chartE);
  var ctx = document.getElementById('chartE');
  if(!ctx || !data.length) return;
  var opts = JSON.parse(JSON.stringify(BASE_OPTS));
  opts.plugins.datalabels = Object.assign({}, DATALABELS_OPTS, {
    formatter: function(v){ return v > 0 ? Math.round(v).toLocaleString('es-CO') : ''; }
  });
  chartE = new Chart(ctx, { type:'bar', data:{
    labels: data.map(function(l){ return l.linea; }),
    datasets:[
      { label:'Programado (PAC)', data: data.map(function(l){ return Math.round(l.prog); }),
        backgroundColor:'rgba(52,211,153,0.35)', borderColor:'#34d399', borderWidth:1 },
      { label:'Notificado (PAC)', data: data.map(function(l){ return Math.round(l.notif); }),
        backgroundColor:'rgba(52,211,153,0.85)', borderColor:'#34d399', borderWidth:1 }
    ]
  }, options: opts });
}

function buildPanelTitle(plantas, lineas, procesos){
  var mainText = '';
  if(lineas.length === 1) mainText = lineas[0];
  else if(plantas.length === 1) mainText = plantas[0];
  else mainText = 'Todas las Plantas';

  var subParts = [];
  if(plantas.length && plantas.length < 6) subParts.push(plantas.join(', '));
  else if(!plantas.length) subParts.push('Todas las plantas');
  if(lineas.length && lineas.length < 5) subParts.push(lineas.join(', '));
  if(procesos.length && procesos.length < 5) subParts.push(procesos.join(', '));

  return '<div class="panel-title-card">'
    +'<div class="panel-title-main">'+mainText+'</div>'
    +'<div class="panel-title-sub">'+subParts.join(' &middot; ')+'</div>'
    +'<div class="panel-title-meta">'
    +'<span>&#128197; Abril 2026 &ndash; Mes completo</span>'
    +'<span>&#128336; Semana 16: 13&ndash;19 Abr</span>'
    +'<span>&#128197; Hoy: Lunes 13 Abr 2026</span>'
    +'<span>&#128260; Última actualización: '+LAST_UPDATE+'</span>'
    +'</div></div>';
}

function renderDashboard(){
  var rows = getFiltered();
  var plantas = getSelected('f-planta'), lineas = getSelected('f-linea'), procesos = getSelected('f-proceso');

  var formRows = rows.filter(function(r){ return r.tipo === 'Formación'; });
  var embRows  = rows.filter(function(r){ return r.tipo === 'Embolsado'; });

  var fProg  = formRows.reduce(function(a,r){ return a + formProg(r); }, 0);
  var fNotif = formRows.reduce(function(a,r){ return a + r.cant_notif; }, 0);
  var fPend  = formRows.reduce(function(a,r){ return a + r.cant_pend; }, 0);
  var fAv    = pct(fNotif, fProg);

  var eProg  = embRows.reduce(function(a,r){ return a + embProg(r); }, 0);
  var eNotif = embRows.reduce(function(a,r){ return a + r.cant_notif; }, 0);
  var ePend  = embRows.reduce(function(a,r){ return a + r.cant_pend; }, 0);
  var eAv    = pct(eNotif, eProg);

  var formByLinea = aggByLinea(rows, 'Formación');
  var embByLinea  = aggByLinea(rows, 'Embolsado');

  var critForm = formByLinea.map(function(l){
    return Object.assign({}, l, { avance: pct(l.notif, l.prog), score: (1 - (l.prog > 0 ? l.notif/l.prog : 0)) * l.pend });
  }).filter(function(l){ return l.prog > 0; }).sort(function(a,b){ return b.score - a.score; }).slice(0, 10);

  var fAvCls = fAv > 100 ? 'over' : fAv < 50 ? 'danger' : fAv < 80 ? 'warn' : '';
  var eAvCls = eAv > 100 ? 'over' : eAv < 50 ? 'danger' : eAv < 80 ? 'warn' : '';

  document.getElementById('main-content').innerHTML =
    buildPanelTitle(plantas, lineas, procesos)

    // Formación KPIs
    +'<div><div class="section-header"><h3>Formación</h3><span class="badge form">KG / Toneladas</span></div>'
    +'<div class="kpi-grid">'
    +'<div class="kpi-card form"><div class="kpi-label">Programado mes</div><div class="kpi-value">'+fmtT(fProg)+'<span style="font-size:12px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fProg)+' KG</div></div>'
    +'<div class="kpi-card form"><div class="kpi-label">Notificado SAP</div><div class="kpi-value">'+fmtT(fNotif)+'<span style="font-size:12px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fNotif)+' KG</div></div>'
    +'<div class="kpi-card form"><div class="kpi-label">Pendiente</div>'
    +(fPend < 0 ? '<div class="kpi-value over">'+fmtT(fPend)+'<span style="font-size:12px"> t</span></div><div class="kpi-sub" style="color:var(--accent2)">&#9650; Sobre lo programado</div>'
                : '<div class="kpi-value '+(fPend > fProg*0.3 ? 'warn' : '')+'">'+fmtT(fPend)+'<span style="font-size:12px;color:var(--text2)"> t</span></div><div class="kpi-sub">'+fmtNum(fPend)+' KG</div>')
    +'</div>'
    +'<div class="kpi-card form"><div class="kpi-label">% Avance</div><div class="kpi-value '+fAvCls+'">'+fAv+'<span style="font-size:12px">%</span>'+(fAv>100?' <span class="over-badge">+100%</span>':'')+'</div><div class="prog-bar-wrap"><div class="prog-bar '+(fAv>100?'over':'form')+'" style="width:'+Math.min(fAv,100)+'%"></div></div></div>'
    +'</div></div>'

    // Embolsado KPIs
    +'<div><div class="section-header"><h3>Embolsado</h3><span class="badge emb">PAC / Unidades</span></div>'
    +'<div class="kpi-grid">'
    +'<div class="kpi-card emb"><div class="kpi-label">Programado mes</div><div class="kpi-value">'+fmtNum(eProg)+'<span style="font-size:12px;color:var(--text2)"> PAC</span></div></div>'
    +'<div class="kpi-card emb"><div class="kpi-label">Notificado SAP</div><div class="kpi-value">'+fmtNum(eNotif)+'<span style="font-size:12px;color:var(--text2)"> PAC</span></div></div>'
    +'<div class="kpi-card emb"><div class="kpi-label">Pendiente</div>'
    +(ePend < 0 ? '<div class="kpi-value over">'+fmtNum(ePend)+'<span style="font-size:12px"> PAC</span></div><div class="kpi-sub" style="color:var(--accent2)">&#9650; Sobre lo programado</div>'
                : '<div class="kpi-value '+(ePend > eProg*0.3 ? 'warn' : '')+'">'+fmtNum(ePend)+'<span style="font-size:12px;color:var(--text2)"> PAC</span></div><div class="kpi-sub">'+fmtNum(ePend)+' PAC</div>')
    +'</div>'
    +'<div class="kpi-card emb"><div class="kpi-label">% Avance</div><div class="kpi-value '+eAvCls+'">'+eAv+'<span style="font-size:12px">%</span>'+(eAv>100?' <span class="over-badge">+100%</span>':'')+'</div><div class="prog-bar-wrap"><div class="prog-bar '+(eAv>100?'over':'emb')+'" style="width:'+Math.min(eAv,100)+'%"></div></div></div>'
    +'</div></div>'

    // Charts
    +'<div class="charts-grid">'
    +'<div class="chart-card"><div class="chart-title">Formación – Prog vs Notif por Línea (t)</div><div style="position:relative;height:240px"><canvas id="chartF"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Embolsado – Prog vs Notif por Línea (PAC)</div><div style="position:relative;height:240px"><canvas id="chartE"></canvas></div></div>'
    +'</div>'

    // Tables
    +'<div class="two-col">'
    +'<div class="table-card"><div class="table-title">&#128203; Formación por Línea <span class="badge form">Toneladas</span></div>'+renderFormTable(formByLinea)+'</div>'
    +'<div class="table-card"><div class="table-title">&#128203; Embolsado por Línea <span class="badge emb">PAC</span></div>'+renderEmbTable(embByLinea)+'</div>'
    +'</div>'

    +'<div class="table-card"><div class="table-title">&#128680; Top 10 Líneas Críticas – Formación <span class="badge form">Bajo avance + Alto pendiente</span></div>'+renderCritTable(critForm)+'</div>'
    +'<div class="table-card"><div class="table-title">&#9203; Órdenes de Embolsado con Pendiente de Entrega <span class="badge emb">Solo órdenes incompletas</span></div>'+renderPendOrders(embRows)+'</div>';

  renderChartF(formByLinea);
  renderChartE(embByLinea);
}

window.addEventListener('load', function(){
  var base = getBase();
  setOptions('f-planta', unique(base.map(function(r){ return r.planta; })), false);
  setOptions('f-linea',  unique(base.map(function(r){ return r.linea; })), false);
  setOptions('f-proceso',unique(base.map(function(r){ return r.proceso; })), false);

  document.getElementById('f-planta').addEventListener('change', onPlantaChange);
  document.getElementById('f-linea').addEventListener('change', onLineaChange);
  document.getElementById('f-proceso').addEventListener('change', onProcesoChange);

  renderDashboard();
});
</script>
</body>
</html>
